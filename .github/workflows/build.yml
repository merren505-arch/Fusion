name: Build and Publish FusionDeweaver

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build & Package Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore FusionDeweaver.csproj

      - name: Validate Local Build
        run: dotnet build FusionDeweaver.csproj --configuration Release --no-restore

      - name: Compile Windows Native (win-x64)
        run: |
          dotnet publish FusionDeweaver.csproj -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=true -p:PublishTrimmed=false -o ./dist/win-x64
          zip -j FusionDeweaver-win-x64.zip ./dist/win-x64/FusionDeweaver.exe

      - name: Compile Linux Native (linux-x64)
        run: |
          dotnet publish FusionDeweaver.csproj -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:PublishTrimmed=false -o ./dist/linux-x64
          tar -czf FusionDeweaver-linux-x64.tar.gz -C ./dist/linux-x64 FusionDeweaver

      - name: Compile macOS Intel (osx-x64)
        run: |
          dotnet publish FusionDeweaver.csproj -c Release -r osx-x64 --self-contained true \
            -p:PublishSingleFile=true -p:PublishTrimmed=false -o ./dist/osx-x64
          tar -czf FusionDeweaver-osx-x64.tar.gz -C ./dist/osx-x64 FusionDeweaver

      - name: Compile macOS Apple Silicon (osx-arm64)
        run: |
          dotnet publish FusionDeweaver.csproj -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=true -p:PublishTrimmed=false -o ./dist/osx-arm64
          tar -czf FusionDeweaver-osx-arm64.tar.gz -C ./dist/osx-arm64 FusionDeweaver

      - name: Archive Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-binaries
          path: |
            FusionDeweaver-win-x64.zip
            FusionDeweaver-linux-x64.tar.gz
            FusionDeweaver-osx-x64.tar.gz
            FusionDeweaver-osx-arm64.tar.gz
          retention-days: 14

      - name: Create Production Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            FusionDeweaver-win-x64.zip \
            FusionDeweaver-linux-x64.tar.gz \
            FusionDeweaver-osx-x64.tar.gz \
            FusionDeweaver-osx-arm64.tar.gz \
            --title "FusionDeweaver ${{ github.ref_name }}" \
            --notes "Automated build release for Tag ${{ github.ref_name }}. Verified clean."
